<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORATINIO | Links</title>
    <!-- פונטים מותאמים לעיצוב הגיימינג והמברשת -->
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rubik:wght@400;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            /* רקע כהה אבסטרקטי עם מרקם גראנג' וסלעים קל בהתאם לתמונה */
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.03) 0%, transparent 70%),
                linear-gradient(180deg, #050505 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Rubik', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 50px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* אפקט השפרצות רקע עדין בצדדים */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(255,255,255,0.01) 25%, transparent 25%),
                        linear-gradient(-45deg, rgba(255,255,255,0.01) 25%, transparent 25%);
            background-size: 60px 60px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 430px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        /* תמונת פרופיל עם אפקט הילה ועשן זוהר לבן */
        .avatar-container {
            position: relative;
            margin-bottom: 25px;
        }

        .avatar-container::before {
            content: "";
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            box-shadow: 0 0 30px 10px rgba(255, 255, 255, 0.25);
            z-index: -1;
            animation: pulse 3s infinite alternate;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.8);
            object-fit: cover;
            display: block;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1.02); opacity: 1; }
        }

        /* כותרת PORATINIO עם פונט מברשת (Grunge) בדיוק כמו בתמונה */
        .brand-name {
            font-family: 'Permanent Marker', 'Montserrat', sans-serif;
            font-size: 52px;
            font-weight: normal;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 2px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            font-style: italic;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #8c8c8c;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        /* לוגו הדרקון הרשמי במרכז */
        .logo-icon {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 35px;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
            opacity: 0.9;
        }

        .links-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 45px;
        }

        /* כפתורים עם מסגרת ניאון לבנה וזוהרת מעוגלת */
        .link-item {
            display: flex;
            align-items: center;
            background: rgba(10, 10, 10, 0.75);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            padding: 16px 22px;
            text-decoration: none;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* אפקט זוהר חזק במעבר עכבר */
        .link-item:hover {
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
            background: rgba(20, 20, 20, 0.9);
        }

        .social-icon {
            font-size: 28px;
            margin-left: 18px;
            width: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* צבעי האייקונים בדיוק לפי העיצוב החדש */
        .fa-youtube { color: #ff0000; filter: drop-shadow(0 0 4px rgba(255,0,0,0.3)); }
        .fa-discord { color: #5865F2; filter: drop-shadow(0 0 4px rgba(88,101,242,0.3)); }
        .fa-tiktok { color: #ffffff; filter: drop-shadow(0 0 4px rgba(255,255,255,0.3)); }

        .link-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-grow: 1;
            text-align: right;
        }

        .link-title {
            font-family: 'Montserrat', 'Rubik', sans-serif;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .link-desc {
            font-size: 11px;
            color: #aaaaaa;
            margin-top: 3px;
            font-weight: 400;
        }

        .arrow-left {
            font-size: 14px;
            color: #ffffff;
            opacity: 0.8;
            transition: transform 0.3s ease;
        }

        .link-item:hover .arrow-left {
            transform: translateX(-3px);
        }

        /* אייקונים קטנים בתחתית בתוך עיגולים זוהרים עדינים */
        .footer-icons {
            display: flex;
            gap: 18px;
            margin-bottom: 40px;
        }

        .footer-icon-link {
            color: #ffffff;
            font-size: 14px;
            text-decoration: none;
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.4);
        }

        .footer-icon-link:hover {
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .footer-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            color: #555555;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

</body>
</html>
